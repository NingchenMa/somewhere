<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}

  .stage{position:fixed;inset:0;background:linear-gradient(160deg,#eef3ef 0%,#e9eef3 55%,#e7f0ef 100%);overflow:hidden;display:flex;flex-direction:column}
  .orb{position:absolute;border-radius:50%;pointer-events:none}
  .orb-a{width:60vw;height:60vw;left:-8vw;top:-12vw;background:radial-gradient(circle,rgba(122,170,155,.5),rgba(122,170,155,0) 68%);filter:blur(40px);animation:auroraDrift 26s ease-in-out infinite}
  .orb-b{width:55vw;height:55vw;right:-10vw;bottom:-14vw;background:radial-gradient(circle,rgba(120,150,184,.46),rgba(120,150,184,0) 68%);filter:blur(48px);animation:auroraDrift2 32s ease-in-out infinite}
  .glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.5),rgba(255,255,255,0) 60%);pointer-events:none}

  header{position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:26px 40px;flex:none}
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer;background:none;border:none}
  .brand .dot{display:inline-block;width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,#5f8f86,#5b7f9e);box-shadow:0 0 0 5px rgba(95,143,134,.12)}
  .brand .name{font-size:25px;font-weight:400;letter-spacing:.04em;color:#2c3a33}
  .header-right{display:flex;align-items:center;gap:10px}
  .lang{display:inline-flex;align-items:center;border:1px solid rgba(95,143,134,.25);border-radius:100px;overflow:hidden}
  .lang-btn{border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:#8a958f;padding:6px 13px;transition:background .2s ease,color .2s ease}
  .lang-btn.active{background:rgba(95,143,134,.14);color:#36433d}
  .lang-btn:hover{color:#36433d}
  .collection{display:inline-flex;align-items:center;gap:8px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#5a665f;padding:8px 12px;border-radius:100px;transition:background .2s ease}
  .collection:hover{background:rgba(95,143,134,.1)}
  .collection .ic{display:inline-block;width:14px;height:14px;border:1.5px solid currentColor;border-radius:3px;opacity:.7}
  .collection .cnt{font-size:13px;color:#8a958f}

  main{position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;padding:0 28px 24px;overflow:hidden}

  .compose{width:100%;max-width:740px;display:flex;flex-direction:column;align-items:center;text-align:center;animation:fadeIn .6s ease both}
  .prompt{font-size:15px;font-weight:400;letter-spacing:.06em;text-transform:uppercase;color:#8a958f;margin-bottom:24px}
  body.zh .prompt{letter-spacing:.16em;text-transform:none}
  #thought{width:100%;border:none;background:transparent;resize:none;overflow:hidden;text-align:center;font-size:36px;font-weight:300;line-height:1.4;color:#1e2a26;caret-color:#5f8f86}
  body.zh #thought{font-size:32px}
  .rule{width:100%;height:1px;margin-top:14px;background:linear-gradient(90deg,transparent,rgba(95,143,134,.4),transparent)}
  .actions{margin-top:30px;display:flex;align-items:center;gap:14px;min-height:46px}
  .find{display:inline-flex;align-items:center;gap:10px;border:none;cursor:pointer;background:#26352f;color:#f3f7f4;font-size:15px;font-weight:500;letter-spacing:.01em;padding:13px 26px;border-radius:100px;animation:fadeIn .4s ease both;transition:background .2s ease}
  .find:hover{background:#1b2722}
  .find .key{font-size:12px;opacity:.65;font-weight:400}
  .hint{font-size:14px;color:#aab4ae;font-weight:400}
  .examples{margin-top:34px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:680px}
  .ex{border:1px solid rgba(95,143,134,.28);background:rgba(255,255,255,.4);cursor:pointer;font-size:13.5px;font-weight:400;color:#5a665f;padding:9px 15px;border-radius:100px;line-height:1.3;transition:background .2s ease,border-color .2s ease}
  .ex:hover{background:rgba(255,255,255,.75);border-color:rgba(95,143,134,.5)}

  .thinking{width:100%;max-width:640px;display:flex;flex-direction:column;align-items:center;text-align:center;animation:fadeIn .5s ease both}
  .echo{font-size:24px;font-weight:300;line-height:1.5;color:#5a665f;font-style:italic}
  body.zh .echo{font-style:normal}
  .dots{margin-top:40px;display:flex;align-items:center;gap:9px}
  .dots span{width:7px;height:7px;border-radius:50%}
  .dots span:nth-child(1){background:#5f8f86;animation:breathe 1.4s ease-in-out infinite}
  .dots span:nth-child(2){background:#638a92;animation:breathe 1.4s ease-in-out .22s infinite}
  .dots span:nth-child(3){background:#5b7f9e;animation:breathe 1.4s ease-in-out .44s infinite}
  .thinking-label{margin-top:22px;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:#9aa5a0}
  body.zh .thinking-label{letter-spacing:.18em;text-transform:none}

  .card-view{width:100%;height:100%;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:8px 0}
  .card{position:relative;width:100%;max-width:680px;margin:auto;background:rgba(255,255,255,.62);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.7);border-radius:6px;box-shadow:0 18px 60px -28px rgba(40,70,60,.4);padding:52px 56px;animation:fadeIn .6s ease both}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px}
  .card-head .kind{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:#9aa5a0}
  .card-head .mark{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:#bcc6c1}
  .eyebrow{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#5f8f86;margin-bottom:12px}
  body.zh .eyebrow,body.zh .card-head .kind{letter-spacing:.16em;text-transform:none}
  .your-thought{font-size:23px;font-weight:300;line-height:1.5;color:#2a352f;font-style:italic;text-wrap:pretty}
  body.zh .your-thought{font-style:normal}
  .divider-l{width:48px;height:1px;margin:34px 0;background:linear-gradient(90deg,rgba(95,143,134,.55),transparent)}
  .card blockquote{font-size:33px;font-weight:300;line-height:1.36;color:#1e2a26;letter-spacing:-.01em;text-wrap:pretty}
  body.zh .card blockquote{font-family:'Noto Serif SC',serif;font-size:30px;line-height:1.5;letter-spacing:.01em}
  .attrib{margin-top:22px;display:flex;flex-direction:column;gap:3px}
  .attrib .author{font-size:16px;font-weight:600;color:#36433d}
  .attrib .source{font-size:14px;font-weight:400;color:#8a958f}
  .why{margin-top:36px;padding-top:32px;border-top:1px solid rgba(95,143,134,.18)}
  .why .body{font-size:17px;font-weight:400;line-height:1.62;color:#46524b;text-wrap:pretty}
  .next{margin-top:28px;background:rgba(95,143,134,.09);border:1px solid rgba(95,143,134,.16);border-radius:5px;padding:22px 24px}
  .next .eyebrow{margin-bottom:9px}
  .next .body{font-size:16px;font-weight:400;line-height:1.55;color:#3c4a43;text-wrap:pretty}
  .regen{position:absolute;inset:0;background:rgba(245,248,246,.72);backdrop-filter:blur(2px);border-radius:6px;display:flex;align-items:center;justify-content:center;gap:9px}

  .card-tools{width:100%;max-width:680px;margin:0 auto 8px;display:flex;flex-direction:column;gap:16px;padding-top:24px}
  .tones{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .tone{border:1px solid rgba(95,143,134,.3);background:rgba(255,255,255,.45);cursor:pointer;font-size:13px;font-weight:500;color:#5a665f;padding:8px 14px;border-radius:100px;transition:background .2s ease,border-color .2s ease}
  .tone:hover{background:rgba(255,255,255,.8);border-color:rgba(95,143,134,.55)}
  .card-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center}
  .act{border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#5a665f;padding:10px 16px;border-radius:100px;transition:background .2s ease}
  .act:hover{background:rgba(95,143,134,.1)}
  .act.primary{border:1px solid rgba(95,143,134,.4);color:#26352f;padding:10px 20px}
  .act.primary:hover{background:rgba(95,143,134,.1)}

  footer{position:relative;z-index:2;text-align:center;padding:18px;font-size:12px;color:#aab4ae;letter-spacing:.02em;flex:none}

  .overlay{position:absolute;inset:0;z-index:8;background:rgba(30,42,38,.18);backdrop-filter:blur(2px);animation:fadeIn .25s ease both}
  .panel{position:absolute;z-index:9;top:0;right:0;height:100%;width:400px;max-width:92vw;background:#f4f7f5;box-shadow:-20px 0 60px -30px rgba(40,70,60,.5);overflow-y:auto;animation:slideIn .32s cubic-bezier(.2,.7,.2,1) both}
  .panel-head{position:sticky;top:0;background:#f4f7f5;display:flex;align-items:center;justify-content:space-between;padding:24px 26px 16px;border-bottom:1px solid rgba(95,143,134,.16)}
  .panel-head .t{font-size:17px;font-weight:600;color:#36433d}
  .panel-head .s{font-size:13px;color:#8a958f;margin-top:2px}
  .panel-close{border:none;background:transparent;cursor:pointer;font-size:22px;line-height:1;color:#8a958f;padding:6px;transition:color .2s ease}
  .panel-close:hover{color:#36433d}
  .saved-list{padding:14px 18px 28px;display:flex;flex-direction:column;gap:12px}
  .saved{position:relative;background:#fff;border:1px solid rgba(95,143,134,.16);border-radius:5px;padding:16px 18px;cursor:pointer;transition:border-color .2s ease}
  .saved:hover{border-color:rgba(95,143,134,.4)}
  .saved .st{font-size:12.5px;color:#8a958f;font-style:italic;line-height:1.4;margin-bottom:8px}
  body.zh .saved .st{font-style:normal}
  .saved .sq{font-size:15px;font-weight:300;line-height:1.4;color:#2a352f}
  .saved .sa{font-size:12.5px;color:#5f8f86;margin-top:8px}
  .saved .sx{position:absolute;top:10px;right:10px;border:none;background:transparent;cursor:pointer;font-size:16px;line-height:1;color:#c2ccc6;padding:4px;transition:color .2s ease}
  .saved .sx:hover{color:#7a8782}
  .empty{padding:60px 30px;text-align:center;font-size:15px;font-weight:300;line-height:1.6;color:#9aa5a0;font-style:italic}
  body.zh .empty{font-style:normal}

  .toast{position:absolute;z-index:20;bottom:64px;left:50%;transform:translateX(-50%);background:#26352f;color:#f3f7f4;font-size:14px;font-weight:500;padding:12px 22px;border-radius:100px;box-shadow:0 12px 40px -16px rgba(0,0,0,.5);animation:toastIn 2.4s ease both;white-space:nowrap}

  [hidden]{display:none !important}

  @media(max-width:640px){
    header{padding:20px}
    .brand .name{font-size:21px}
    .header-right{gap:6px}
    .collection{padding:8px 8px}
    #thought{font-size:28px}
    body.zh #thought{font-size:25px}
    .card{padding:36px 26px}
    .card blockquote{font-size:27px}
    body.zh .card blockquote{font-size:25px}
    .your-thought{font-size:20px}
    .echo{font-size:21px}
  }
  @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;animation-iteration-count:1 !important}}
</style>
</head>
<body>
<div class="stage">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="glow"></div>

  <header>
    <button class="brand" id="brand" aria-label="Start over">
      <span class="dot"></span>
      <span class="name">Somewhere</span>
    </button>
    <div class="header-right">
      <div class="lang" id="lang">
        <button class="lang-btn" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <button class="collection" id="open-panel">
        <span class="ic"></span> <span id="collection-label">Collection</span>
        <span class="cnt" id="saved-count" hidden></span>
      </button>
    </div>
  </header>

  <main>
    <section class="compose" id="view-compose">
      <p class="prompt" id="prompt">What's on your mind?</p>
      <textarea id="thought" rows="1" aria-label="Write a thought"></textarea>
      <div class="rule"></div>
      <div class="actions">
        <button class="find" id="find" hidden><span id="find-label">Find what meets it</span> <span class="key" id="find-key">Enter</span></button>
        <span class="hint" id="hint"></span>
      </div>
      <div class="examples" id="examples"></div>
    </section>

    <section class="thinking" id="view-thinking" hidden>
      <p class="echo" id="echo"></p>
      <div class="dots"><span></span><span></span><span></span></div>
      <p class="thinking-label" id="thinking-label"></p>
    </section>

    <section class="card-view sw-scroll" id="view-card" hidden>
      <div class="card">
        <div class="card-head">
          <span class="kind" id="kind"></span>
          <span class="mark" id="mark">Somewhere · resonance</span>
        </div>
        <p class="eyebrow" id="ey-thought">Your thought</p>
        <p class="your-thought" id="refined"></p>
        <div class="divider-l"></div>
        <p class="eyebrow" id="ey-felt">Someone felt this too</p>
        <blockquote id="quote"></blockquote>
        <div class="attrib">
          <span class="author" id="author"></span>
          <span class="source" id="source"></span>
        </div>
        <div class="why">
          <p class="eyebrow" id="ey-why">Why this meets you</p>
          <p class="body" id="why"></p>
        </div>
        <div class="next">
          <p class="eyebrow" id="next-label"></p>
          <p class="body" id="next"></p>
        </div>
        <div class="regen" id="regen" hidden>
          <span class="dots" style="margin:0"><span style="width:7px;height:7px;border-radius:50%;background:#5f8f86;animation:breathe 1.4s ease-in-out infinite"></span><span style="width:7px;height:7px;border-radius:50%;background:#638a92;animation:breathe 1.4s ease-in-out .22s infinite"></span><span style="width:7px;height:7px;border-radius:50%;background:#5b7f9e;animation:breathe 1.4s ease-in-out .44s infinite"></span></span>
        </div>
      </div>

      <div class="card-tools">
        <div class="tones" id="tones"></div>
        <div class="card-actions">
          <button class="act" id="find-another"></button>
          <button class="act" id="save"></button>
          <button class="act" id="copy"></button>
          <button class="act primary" id="write-another"></button>
        </div>
      </div>
    </section>
  </main>

  <footer id="footer"></footer>

  <div class="overlay" id="overlay" hidden></div>
  <aside class="panel sw-scroll" id="panel" hidden>
    <div class="panel-head">
      <div>
        <p class="t" id="panel-title">Your collection</p>
        <p class="s" id="panel-sub">A map of what you've been thinking</p>
      </div>
      <button class="panel-close" id="close-panel" aria-label="Close">×</button>
    </div>
    <div id="panel-body"></div>
  </aside>

  <div class="toast" id="toast" hidden></div>
</div>

  // ===========================================================================
  // Resonance engine (local theme-matcher; LLM path used if a host provides one)
  // ===========================================================================
  function localMatch(thought){
    var quotes=D().quotes, t=' '+thought.toLowerCase()+' ', best=null, score=0;
    for(var i=0;i<quotes.length;i++){
      var q=quotes[i], s=0;
      for(var j=0;j<q.themes.length;j++){ if(t.indexOf(q.themes[j])!==-1) s++; }
      if(s>score){ score=s; best=q; }
    }
    return best || rand(quotes);
  }
  function localCard(thought, exclude){
    var q=localMatch(thought), L=D().local;
    if(exclude && q.text===exclude){ q=rand(D().quotes); }
    return { refinedThought:thought, kind:L.kind, quote:q, provenance:'exact',
      why:L.why, nextMove:{label:L.nextLabel, text:L.nextText} };
  }
  function buildPrompt(thought, tone, prev){
    var langLine = state.lang==='zh'
      ? "\n- 用简体中文写作。强烈优先选用中文世界（如老子、庄子、论语、唐诗宋词、鲁迅）或西方公共领域作者的真实名句。"
      : '';
    var toneLine = tone ? "\n- Voice: make the writing distinctly more "+tone+"." : '';
    var avoid = prev ? "\n- Do NOT reuse this quote: \""+prev+"\"." : '';
    return 'You are the resonance engine for "Somewhere": meet a person\'s thought with the words of someone who felt the same across time.\n\nThe person wrote:\n"""'+thought+'"""\n\n1. Name the single core feeling underneath their words.\n2. Surface the ONE real quotation that most deeply meets it — by meaning, not shared words.\n\nRULES: real, identifiable author, accurate attribution, never fabricate. Prefer public-domain voices. Under ~30 words. If adapted, provenance "paraphrased"; if distilled, "inspired"; else "exact".'+langLine+toneLine+avoid+'\n\nReturn ONLY JSON:\n{"quote":"...","author":"...","work":"...","year":"...","provenance":"exact|paraphrased|inspired","kind":"short lowercase noun phrase","whyItResonates":"2-3 warm second-person sentences","nextMove":{"label":"short label","text":"1-2 gentle sentences"}}';
  }
  function parse(rawText, thought){
    var s=rawText.trim(), a=s.indexOf('{'), b=s.lastIndexOf('}');
    if(a!==-1&&b!==-1) s=s.slice(a,b+1);
    var o=JSON.parse(s), nm=o.nextMove||{};
    var qt=(o.quote||'').trim().replace(/^["“”「」']+|["“”「」']+$/g,'').trim();
    if(!qt) throw new Error('no-quote');
    return { refinedThought:thought, kind:(o.kind||D().local.kind).trim(),
      quote:{text:qt,author:(o.author||'').trim(),work:(o.work||'').trim(),year:(o.year||'').trim()},
      provenance:(o.provenance||'exact').toLowerCase(), why:(o.whyItResonates||'').trim(),
      nextMove:{label:(nm.label||D().local.nextLabel).trim(),text:(nm.text||'').trim()} };
  }
  function generate(thought, tone, isRegen){
    var prev = state.card && state.card.quote ? state.card.quote.text : null;
    var finish=function(card){ state.card=card; state.regenerating=false; state.phase='card'; render(); };
    if(isRegen){ state.regenerating=true; render(); } else { state.phase='thinking'; state.thought=thought; render(); }
    if(window.claude && window.claude.complete){
      window.claude.complete(buildPrompt(thought,tone,isRegen?prev:null))
        .then(function(r){ try{ finish(parse(r,thought)); }catch(e){ finish(localCard(thought,isRegen?prev:null)); } })
        .catch(function(){ finish(localCard(thought,isRegen?prev:null)); });
      return;
    }
    var delay=isRegen?1100:1800;
    clearTimeout(isRegen?regenTimer:thinkTimer);
    var tm=setTimeout(function(){ finish(localCard(thought,isRegen?prev:null)); }, delay);
    if(isRegen) regenTimer=tm; else thinkTimer=tm;
  }

    if(c.provenance==='paraphrased') s += (s?' · ':'')+T().provPara;

  function render(){
    $('view-compose').hidden = state.phase!=='compose';
    $('view-thinking').hidden = state.phase!=='thinking';

    }
    if(state.phase==='thinking'){ $('echo').textContent=state.thought; $('thinking-label').textContent=rand(D().thinkingLabels); }

      var c=state.card, q=c.quote||{};
      $('kind').textContent=c.kind||D().local.kind;
      $('refined').textContent=c.refinedThought;
      $('quote').textContent=q.text;
      $('author').textContent=q.author;
      $('source').textContent=sourceLine(c);
      $('why').textContent=c.why;
      $('next-label').textContent=T().next+' · '+((c.nextMove&&c.nextMove.label)||'');
      $('next').textContent=(c.nextMove&&c.nextMove.text)||'';
      $('regen').hidden=!state.regenerating;
      $('save').textContent=isSaved(c)?T().saved:T().save;
    }
  }
  function renderPanel(){
    var body=$('panel-body');
    if(state.saved.length===0){ body.innerHTML='<p class="empty">'+T().empty+'</p>'; return; }
    var open=state.lang==='zh'?'「':'“', close=state.lang==='zh'?'」':'”', html='<div class="saved-list">';
    for(var i=0;i<state.saved.length;i++){
      var s=state.saved[i], q=s.quote||{};
      html+='<div class="saved" data-id="'+esc(s.id)+'">'
        +'<p class="st">'+esc(s.thought)+'</p>'
        +'<p class="sq">'+open+esc(q.text)+close+'</p>'
        +'<p class="sa">'+esc(q.author)+'</p>'
        +'<button class="sx" data-remove="'+esc(s.id)+'" aria-label="remove">×</button>'
        +'</div>';
    }
    body.innerHTML=html+'</div>';
  }
  function openPanel(){ state.panelOpen=true; renderPanel(); $('overlay').hidden=false; $('panel').hidden=false; }
  function closePanel(){ state.panelOpen=false; $('overlay').hidden=true; $('panel').hidden=true; }
  function reset(){
    clearTimeout(thinkTimer); clearTimeout(regenTimer);
    state.phase='compose'; state.thought=''; state.card=null; state.regenerating=false; closePanel();
    ta.value=''; render(); setTimeout(function(){ grow(); ta.focus(); },60);
  }

  // ===========================================================================
  // Wiring
  // ===========================================================================
  $('examples').addEventListener('click', function(e){
    var b=e.target.closest('.ex'); if(!b) return;
    ta.value=D().examples[+b.getAttribute('data-i')]; state.thought=ta.value; render(); grow(); ta.focus();
  });
  $('tones').addEventListener('click', function(e){
    var b=e.target.closest('.tone'); if(!b||state.regenerating) return;
    generate(state.thought, b.getAttribute('data-key'), true);
  });
  ta.addEventListener('input', function(){ state.thought=ta.value; render(); grow(); });
  ta.addEventListener('keydown', function(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); if(state.thought.trim()) generate(state.thought,null,false); } });
  $('find').addEventListener('click', function(){ if(state.thought.trim()) generate(state.thought,null,false); });
  $('find-another').addEventListener('click', function(){ if(!state.regenerating) generate(state.thought,null,true); });
  $('write-another').addEventListener('click', reset);
  $('brand').addEventListener('click', reset);
  $('open-panel').addEventListener('click', openPanel);
  $('close-panel').addEventListener('click', closePanel);
  $('overlay').addEventListener('click', closePanel);
  $('lang').addEventListener('click', function(e){ var b=e.target.closest('.lang-btn'); if(b) setLang(b.getAttribute('data-lang')); });

  $('save').addEventListener('click', function(){
    if(!state.card) return;
    if(isSaved(state.card)){ flash(T().toastAlready); return; }
    var c=state.card;
    state.saved.unshift({ id:Date.now()+''+Math.floor(Math.random()*999), thought:state.thought, refinedThought:c.refinedThought, kind:c.kind, quote:c.quote, provenance:c.provenance, why:c.why, nextMove:c.nextMove });
    persist(); render(); flash(T().toastSaved);
  });
  $('copy').addEventListener('click', function(){
    if(!state.card) return;
    var q=state.card.quote||{}, zh=state.lang==='zh';
    var attrib = zh ? ('—— '+q.author+'《'+q.work+'》'+(q.year?'，'+q.year:'')) : ('— '+q.author+', '+q.work+(q.year?', '+q.year:''));
    var open=zh?'「':'“', close=zh?'」':'”';
    var txt=open+q.text+close+'\n'+attrib+'\n\n'+T().on+state.card.refinedThought+'\n\n'+T().via;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){ flash(T().toastCopied); }, function(){ flash(T().toastNoCopy); });
    } else { flash(T().toastNoCopy); }
  });
  $('panel-body').addEventListener('click', function(e){
    var rm=e.target.closest('[data-remove]');
    if(rm){ e.stopPropagation(); var id=rm.getAttribute('data-remove'); state.saved=state.saved.filter(function(x){return x.id!==id;}); persist(); render(); renderPanel(); return; }
    var card=e.target.closest('.saved'); if(!card) return;
    var sid=card.getAttribute('data-id');
    for(var i=0;i<state.saved.length;i++){ if(state.saved[i].id===sid){
      var s=state.saved[i];
      state.card={ refinedThought:s.refinedThought, kind:s.kind, quote:s.quote, provenance:s.provenance, why:s.why, nextMove:s.nextMove };
      state.thought=s.thought; state.phase='card'; closePanel(); render(); break;
    } }
  });

  // ===========================================================================
  // Boot
  // ===========================================================================
  applyStaticText();
  render();
  ta.focus();
})();
</script>
</body>
</html>
